version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: filmrecs-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - filmrecs-db-data:/var/opt/mssql
    networks:
      - filmrecs-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: FilmRecomendations.WebApi/Dockerfile
    container_name: filmrecs-api
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5291
      - ConnectionStrings__FilmConnectionString=Server=db;Database=FilmRecommendations;User=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
      - TMDb__BaseUrl=https://api.themoviedb.org/3/
      - TMDb__ApiKey=${TMDB_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - GROK__ApiKey=${GROK_API_KEY}
      - Jwt__Key=${JWT_KEY:-your_jwt_secret_key_here}
      - Jwt__Issuer=${JWT_ISSUER:-FilmRecomendationWebsite}
      - Jwt__Audience=${JWT_AUDIENCE:-ClientApplication}
    # Removed direct port exposure, will be accessed through nginx
    networks:
      - filmrecs-network
    restart: unless-stopped

  frontend:
    build:
      context: ./FilmRecommendations.Frontend
      dockerfile: Dockerfile
    container_name: filmrecs-frontend
    depends_on:
      - api
    volumes:
      - ./FilmRecommendations.Frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    # Removed direct port exposure, will be accessed through nginx
    networks:
      - filmrecs-network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: filmrecs-nginx
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - filmrecs-network
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: filmrecs-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - filmrecs-network
    restart: unless-stopped

networks:
  filmrecs-network:
    driver: bridge

volumes:
  filmrecs-db-data:
  jenkins_home:
