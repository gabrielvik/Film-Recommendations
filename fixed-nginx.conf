server { 
    listen 80; 
    server_name localhost; 
    root /usr/share/nginx/html; 
    index index.html; 
 
    # Enable gzip compression 
    gzip on; 
    gzip_comp_level 5; 
    gzip_min_length 256; 
    gzip_proxied any; 
    gzip_vary on; 
    gzip_types 
        application/javascript 
        application/json 
        application/x-javascript 
        application/xml 
        image/svg+xml 
        text/css 
        text/javascript 
        text/plain 
        text/xml; 
 
    # API proxy configuration - Use correct port 5292 and container name filmrecs-api 
    location /FilmRecomendations/ { 
        proxy_pass http://192.168.1.10:5292/FilmRecomendations/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
 
    # Add lowercase version 
    location /filmrecomendations/ { 
        proxy_pass http://192.168.1.10:5292/FilmRecomendations/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
 
    # Swagger proxy configuration 
    location /swagger/ { 
        proxy_pass http://192.168.1.10:5292/swagger/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
 
    location /api/ { 
        proxy_pass http://192.168.1.10:5292/api/; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
 
    # Enable CORS 
    add_header 'Access-Control-Allow-Origin' '*' always; 
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always; 
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always; 
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always; 
 
    # Handle OPTIONS method for CORS preflight requests 
    if ($request_method = 'OPTIONS') { 
        add_header 'Access-Control-Allow-Origin' '*'; 
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE'; 
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization'; 
        add_header 'Access-Control-Max-Age' 1728000; 
        add_header 'Content-Type' 'text/plain; charset=utf-8'; 
        add_header 'Content-Length' 0; 
        return 204; 
    } 
 
    # Handle single page application routing 
    location / { 
        try_files $uri $uri/ /index.html; 
    } 
 
    # Cache static assets 
