<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Details</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="h-full">
    <div class="flex flex-col min-h-screen">
        <!-- Header -->
        <header class="bg-gradient-to-r from-blue-600 to-indigo-800 text-white p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <a href="/" class="flex items-center">
                        <img src="/src/assets/logo.svg" alt="Logo" class="h-8 w-8">
                        <span class="text-xl font-bold ml-2">FilmRecommendations</span>
                    </a>
                    <a href="profile.html" class="text-white hover:underline">Profile</a>
                </div>
                <button id="backButton" class="text-white hover:text-gray-200 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-1">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    Back to Results
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow">
            <div id="seriesDetailsContainer" class="bg-gray-100 dark:bg-gray-800 min-h-screen transition-all duration-500">
                <div id="seriesDetailsContent" class="container mx-auto py-4 px-4">
                    <!-- Content will be filled dynamically -->
                    <div class="animate-pulse">
                        <div class="flex flex-col md:flex-row gap-8">
                            <div class="w-full md:w-1/3">
                                <div class="bg-gray-300 dark:bg-gray-700 rounded-lg h-96"></div>
                            </div>
                            <div class="w-full md:w-2/3">
                                <div class="h-8 bg-gray-300 dark:bg-gray-700 rounded w-3/4 mb-4"></div>
                                <div class="h-4 bg-gray-300 dark:bg-gray-700 rounded w-1/2 mb-4"></div>
                                <div class="h-4 bg-gray-300 dark:bg-gray-700 rounded w-full mb-2"></div>
                                <div class="h-4 bg-gray-300 dark:bg-gray-700 rounded w-full mb-2"></div>
                                <div class="h-4 bg-gray-300 dark:bg-gray-700 rounded w-3/4 mb-4"></div>
                                
                                <div class="h-10 bg-gray-300 dark:bg-gray-700 rounded w-full mt-6"></div>
                                <div class="grid grid-cols-3 gap-4 mt-6">
                                    <div class="h-24 bg-gray-300 dark:bg-gray-700 rounded"></div>
                                    <div class="h-24 bg-gray-300 dark:bg-gray-700 rounded"></div>
                                    <div class="h-24 bg-gray-300 dark:bg-gray-700 rounded"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Actor Modal -->
            <div id="actorModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
                <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] mx-4 overflow-hidden opacity-0 transform transition-all duration-300">
                    <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white">Actor Details</h3>
                        <button id="closeActorModal" class="text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div id="actorDetailsContent" class="overflow-y-auto max-h-[calc(90vh-60px)]">
                        <!-- Actor details will be loaded here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Notification -->
        <div id="notification" class="fixed bottom-4 right-4 p-4 rounded-lg shadow-lg hidden transform transition-all duration-300 z-50">
            <div class="flex items-center">
                <span id="notificationText" class="ml-2"></span>
                <button id="closeNotification" class="ml-4 text-gray-600 hover:text-gray-800 dark:text-gray-300 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-gray-800 text-white py-4">
            <div class="container mx-auto text-center">
                <p>&copy; 2024 FilmRecommendations</p>
            </div>
        </footer>
    </div>

    <script type="module" src="/src/series-details-script.js"></script>
</body>
</html>
